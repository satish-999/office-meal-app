# Free nightly no-show job — calls your Render app with CRON_SECRET.
# Setup: GitHub repo → Settings → Secrets → Actions:
#   RENDER_APP_URL = https://office-meal-app-279y.onrender.com
#   CRON_SECRET    = same value as CRON_SECRET on Render

name: Nightly no-show job

on:
  schedule:
    # 18:00 UTC ≈ 11:30 PM IST — adjust for your office timezone
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  process-no-shows:
    runs-on: ubuntu-latest
    steps:
      - name: Process no-shows for today (UTC date)
        env:
          RENDER_APP_URL: ${{ secrets.RENDER_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$RENDER_APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Skip: set RENDER_APP_URL and CRON_SECRET in GitHub Actions secrets"
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          echo "Running no-show job for $DATE"
          curl -sf -X POST "${RENDER_APP_URL}/api/admin/jobs/no-shows" \
            -H "Content-Type: application/json" \
            -H "X-Cron-Secret: ${CRON_SECRET}" \
            -d "{\"date\":\"${DATE}\"}"
