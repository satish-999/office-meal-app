services:
  - type: web
    name: office-meal-app
    runtime: node
    plan: free
    # NODE_ENV=production skips devDependencies — TypeScript/Vite needed to build
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DEV_QR_SECRET
        generateValue: true
      - key: DEV_AUTH_SECRET
        generateValue: true
